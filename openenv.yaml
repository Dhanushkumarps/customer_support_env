# openenv.yaml — OpenEnv manifest for the Customer Support Environment.
# Describes the environment, its models, available tasks, and deployment metadata.

name: customer_support_env
version: "0.1.0"
description: >
  A realistic customer support simulation environment where an AI agent must
  classify tickets, craft responses, and manage multi-turn conversations to
  resolve customer issues.

# Pydantic model names (defined in models.py)
action: SupportAction
observation: SupportObservation
state: SupportState

# Available task tiers
tasks:
  - name: easy
    description: >
      Ticket Classification: given a single customer message, the agent must
      output the correct issue category (refund, technical, shipping, billing,
      or account). Scored as 0.0 or 1.0.
    difficulty: easy
    max_steps: 1

  - name: medium
    description: >
      Single-Turn Response: the agent must write a helpful, relevant reply
      that resolves the customer's issue in one message. Scored 0.0–1.0 based
      on keyword coverage, response detail, and avoidance of unnecessary
      escalation.
    difficulty: medium
    max_steps: 1

  - name: hard
    description: >
      Multi-Turn Conversation: the agent handles a full 3-turn support
      dialogue — ask a clarifying question, provide a resolution, and close
      the ticket politely. Scored 0.0–1.0 across all turns.
    difficulty: hard
    max_steps: 10

tags:
  - customer-support
  - nlp
  - multi-turn
  - classification

author: "your-hf-username"
hf_space: "your-hf-username/customer_support_env"
